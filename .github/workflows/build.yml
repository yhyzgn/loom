name: build loom executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:


permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build executable
        run: python scripts/build.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: loom-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/loom-*
            dist/*.sha256
          if-no-files-found: error


  release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/loom-* --title "${GITHUB_REF_NAME}" --notes "Cross-platform loom executables built by GitHub Actions." --verify-tag || \
          gh release upload "${GITHUB_REF_NAME}" release-assets/loom-* --clobber
